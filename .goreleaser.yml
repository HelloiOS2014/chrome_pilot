version: 2

builds:
  - main: .
    binary: chrome-pilot
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "chrome-pilot_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - install.sh
      - skills/**/*
      - extension/**/*

checksum:
  name_template: checksums.txt
