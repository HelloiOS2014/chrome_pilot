version: 2

builds:
  - id: chrome-pilot
    main: .
    binary: chrome-pilot
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: binary
    builds:
      - chrome-pilot
    format: tar.gz
    name_template: "chrome-pilot_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - install.sh
      - skills/**/*
      - extension/**/*

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: HelloiOS2014
    name: chrome_pilot
  draft: false
  prerelease: auto
  extra_files:
    - glob: /tmp/extension.zip
