<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chrome Pilot</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 300px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        color: #202124;
        background: #fff;
        padding: 16px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      header h1 {
        font-size: 16px;
        font-weight: 600;
      }

      .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
        background: #9e9e9e;
        transition: background 0.3s;
      }

      .status-dot.connected {
        background: #34a853;
      }

      .status-dot.disconnected {
        background: #ea4335;
      }

      .status-label {
        font-size: 12px;
        color: #5f6368;
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: #3c4043;
        margin-bottom: 4px;
      }

      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: #1a73e8;
      }

      button {
        margin-top: 10px;
        width: 100%;
        padding: 8px;
        background: #1a73e8;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover {
        background: #1557b0;
      }

      button:active {
        background: #0f4490;
      }

      .save-msg {
        margin-top: 8px;
        font-size: 12px;
        color: #34a853;
        min-height: 16px;
        text-align: center;
      }

      .divider {
        border: none;
        border-top: 1px solid #e8eaed;
        margin: 14px 0;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #5f6368;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="status-dot" id="statusDot"></span>
      <h1>Chrome Pilot</h1>
    </header>

    <p class="status-label" id="statusLabel">Checking connection…</p>

    <hr class="divider" />

    <label for="tokenInput">Auth Token</label>
    <input
      type="password"
      id="tokenInput"
      placeholder="Paste your daemon token here"
      autocomplete="off"
    />
    <button id="saveBtn">Save Token</button>
    <p class="save-msg" id="saveMsg"></p>

    <hr class="divider" />

    <div class="info-row">
      <span>Daemon</span>
      <span>ws://localhost:9333/ws</span>
    </div>
    <div class="info-row">
      <span>Version</span>
      <span>0.1.0</span>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
