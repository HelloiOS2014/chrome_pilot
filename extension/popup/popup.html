<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chrome Pilot</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 240px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        color: #202124;
        background: #fff;
        padding: 16px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      header h1 { font-size: 16px; font-weight: 600; }
      .status-dot {
        width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
        background: #9e9e9e; transition: background 0.3s;
      }
      .status-dot.connected { background: #34a853; }
      .status-dot.disconnected { background: #ea4335; }
      .status-label { font-size: 12px; color: #5f6368; margin-bottom: 12px; }
      .divider { border: none; border-top: 1px solid #e8eaed; margin: 12px 0; }
      .info-row {
        display: flex; justify-content: space-between;
        font-size: 12px; color: #5f6368; margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="status-dot" id="statusDot"></span>
      <h1>Chrome Pilot</h1>
    </header>
    <p class="status-label" id="statusLabel">Checking connection…</p>
    <hr class="divider" />
    <div class="info-row">
      <span>Daemon</span>
      <span>localhost:9333</span>
    </div>
    <div class="info-row">
      <span>Token</span>
      <span>auto-fetched</span>
    </div>
    <div class="info-row">
      <span>Version</span>
      <span>0.1.0</span>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
