name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Chrome Extension zip
        run: |
          cd extension && zip -r /tmp/extension.zip . && cd ..
          gh release upload "${{ github.ref_name }}" /tmp/extension.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
